name: Build & Push Docker Image — Frontend

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: tigrupopapa/papa-expedicao-front:latest
          cache-from: type=registry,ref=tigrupopapa/papa-expedicao-front:buildcache
          cache-to: type=registry,ref=tigrupopapa/papa-expedicao-front:buildcache,mode=max
